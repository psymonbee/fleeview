      // with nesting + task-list checkboxes, GFM pipe tables, thematic breaks,
      // and inline code/bold/italic/strike/links.

      function mdEl(tag, className) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        return node;
      }

      function mdSafeUrl(url) {
        const u = String(url || "").trim();
        return /^(https?:|mailto:)/i.test(u) ? u : null;
      }

      const RE_LIST_ITEM = /^(\s*)([-*+]|\d{1,9}[.)])(\s+)(.*)$/;
      const RE_HEADING = /^\s{0,3}(#{1,6})\s+(.*?)\s*#*\s*$/;
      const RE_FENCE = /^(\s*)(`{3,}|~{3,})\s*([^`]*)$/;
      const RE_HR = /^\s{0,3}([-*_])(?:\s*\1){2,}\s*$/;
      const RE_QUOTE = /^\s{0,3}>/;
      const RE_TABLE_SEP = /^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)*\|?\s*$/;

      function listItemMatch(line) {
        const m = RE_LIST_ITEM.exec(line);
        if (!m) return null;
        const indent = m[1].replace(/\t/g, "  ").length;
        return { indent, marker: m[2], ordered: /\d/.test(m[2]), content: m[4] };
      }

      function isBlockInterrupt(line, next) {
        if (line == null || /^\s*$/.test(line)) return true;
        if (RE_HEADING.test(line)) return true;
        if (RE_FENCE.test(line)) return true;
        if (RE_HR.test(line)) return true;
        if (RE_QUOTE.test(line)) return true;
        if (RE_LIST_ITEM.test(line)) return true;
        if (line.includes("|") && next && RE_TABLE_SEP.test(next)) return true;
        return false;
      }

      // Inline pass: append formatted nodes for `text` into `parent`.
      function renderInline(parent, text) {
        const str = String(text);
        const len = str.length;
        let i = 0;
        let buf = "";
        const flush = () => {
          if (buf) { parent.appendChild(document.createTextNode(buf)); buf = ""; }
        };

        while (i < len) {
          const ch = str[i];

          if (ch === "\\" && i + 1 < len) { buf += str[i + 1]; i += 2; continue; }

          if (ch === "`") {
            const m = /^(`+)([\s\S]*?)\1(?!`)/.exec(str.slice(i));
            if (m) {
              flush();
              const code = mdEl("code");
              code.textContent = m[2].replace(/^ (.*) $/, "$1");
              parent.appendChild(code);
              i += m[0].length;
              continue;
            }
          }

          if (ch === "[") {
            const m = /^\[((?:\\.|[^\]])*)\]\(\s*(<[^>]*>|[^)\s]+)(?:\s+"[^"]*")?\s*\)/.exec(str.slice(i));
            if (m) {
              const href = mdSafeUrl(m[2].replace(/^<|>$/g, ""));
              flush();
              if (href) {
                const a = mdEl("a");
                a.href = href;
                a.target = "_blank";
                a.rel = "noopener noreferrer";
                renderInline(a, m[1]);
                parent.appendChild(a);
              } else {
                renderInline(parent, m[1]);
              }
              i += m[0].length;
              continue;
            }
          }

          if ((ch === "*" || ch === "_") && str.slice(i, i + 2) === ch + ch) {
            const close = str.indexOf(ch + ch, i + 2);
            if (close > i + 2) {
              flush();
              const strong = mdEl("strong");
              renderInline(strong, str.slice(i + 2, close));
              parent.appendChild(strong);
              i = close + 2;
              continue;
            }
          }

          if (ch === "~" && str[i + 1] === "~") {
            const close = str.indexOf("~~", i + 2);
            if (close > i + 2) {
              flush();
              const del = mdEl("del");
              renderInline(del, str.slice(i + 2, close));
              parent.appendChild(del);
              i = close + 2;
              continue;
            }
          }

          if (ch === "*" || ch === "_") {
            // `_` emphasis is honoured only at word boundaries so identifiers
            // like snake_case and __init__ survive intact; `*` is unrestricted.
            const isUnderscore = ch === "_";
            const prev = i > 0 ? str[i - 1] : " ";
            if (!isUnderscore || /[\s([{"'~*]/.test(prev)) {
              let j = i + 1;
              let close = -1;
              while (j < len) {
                if (str[j] === "\\") { j += 2; continue; }
                if (str[j] === ch && str[j - 1] !== ch && str[j + 1] !== ch) {
                  const nxt = j + 1 < len ? str[j + 1] : " ";
                  if (!isUnderscore || /[\s)\]}.,!?;:"'~*]/.test(nxt)) { close = j; break; }
                }
                j++;
              }
              if (close > i + 1) {
                flush();
                const em = mdEl("em");
                renderInline(em, str.slice(i + 1, close));
                parent.appendChild(em);
                i = close + 1;
                continue;
              }
            }
          }

          buf += ch;
          i++;
        }
        flush();
      }

      function dedentLines(lines) {
        let min = Infinity;
        for (const l of lines) {
          if (/^\s*$/.test(l)) continue;
          const n = l.length - l.replace(/^\s+/, "").length;
          if (n < min) min = n;
        }
        if (!isFinite(min) || min === 0) return lines.slice();
        return lines.map(l => (/^\s*$/.test(l) ? l : l.slice(min)));
      }

      // Consumes one list item (its inline text plus any more-indented
      // continuation/nested block lines) and returns the next line index.
      // Nested lists and multi-paragraph items fall out of the recursive
      // renderMarkdownInto on the dedented child block.
      function appendListItem(lines, start, listEl) {
        const first = listItemMatch(lines[start]);
        const baseIndent = first.indent;
        const li = mdEl("li");
        let content = first.content;

        const task = /^\[([ xX])\]\s+(.*)$/.exec(content);
        // A task <li> is a flex row [checkbox | body]; its text and any nested
        // blocks stack inside the body column so a sub-list indents *below* the
        // text rather than becoming a third flex column beside it. A plain <li>
        // hosts its inline text directly so `li::marker` still draws the bullet.
        let textHost = li;
        let childHost = li;
        if (task) {
          li.classList.add("md-task");
          const checked = /[xX]/.test(task[1]);
          const box = mdEl("span", "md-check" + (checked ? " done" : ""));
          box.setAttribute("aria-hidden", "true");
          if (checked) box.textContent = "✓";
          li.appendChild(box);
          const body = mdEl("div", "md-li-body");
          li.appendChild(body);
          textHost = mdEl("span", "md-li-text");
          body.appendChild(textHost);
          childHost = body;
          content = task[2];
        }
        renderInline(textHost, content);

        let i = start + 1;
        const childLines = [];
        while (i < lines.length) {
          if (/^\s*$/.test(lines[i])) {
            // A blank line stays with this item only when more-indented
            // content follows (loose list / multi-paragraph item).
            let k = i + 1;
            while (k < lines.length && /^\s*$/.test(lines[k])) k++;
            const follow = k < lines.length ? lines[k] : null;
            const followIndent = follow ? follow.length - follow.replace(/^\s+/, "").length : 0;
            if (follow && followIndent > baseIndent) { childLines.push(""); i++; continue; }
            break;
          }
          const m = listItemMatch(lines[i]);
          const indent = lines[i].length - lines[i].replace(/^\s+/, "").length;
          if (m && m.indent <= baseIndent) break;      // sibling or outer item
          if (indent <= baseIndent) break;             // dedented plain line
          childLines.push(lines[i]);                   // nested / continuation
          i++;
        }

        if (childLines.length) {
          renderMarkdownInto(childHost, dedentLines(childLines).join("\n"), true);
        }

        listEl.appendChild(li);
        return i;
      }

      function parseList(lines, start, parent) {
        const first = listItemMatch(lines[start]);
        const ordered = first.ordered;
        const baseIndent = first.indent;
        const listEl = mdEl(ordered ? "ol" : "ul", "md-list");
        if (ordered) {
          const n = parseInt(first.marker, 10);
          if (n > 1) listEl.setAttribute("start", String(n));
        }
        let i = start;
        while (i < lines.length) {
          if (/^\s*$/.test(lines[i])) {
            let k = i + 1;
            while (k < lines.length && /^\s*$/.test(lines[k])) k++;
            const nm = k < lines.length ? listItemMatch(lines[k]) : null;
            if (nm && nm.indent >= baseIndent) { i = k; continue; }
            break;
          }
          const m = listItemMatch(lines[i]);
          // Siblings at baseIndent extend the list; anything shallower ends it.
          // Deeper items were already swallowed by the previous item's child
          // block, so they never surface here.
          if (!m || m.indent !== baseIndent) break;
          i = appendListItem(lines, i, listEl);
        }
        parent.appendChild(listEl);
        return i;
      }

      function parseTable(lines, start, parent) {
        const splitRow = row => {
          let s = row.trim();
          s = s.replace(/^\|/, "").replace(/\|$/, "");
          const cells = [];
          let cur = "";
          for (let i = 0; i < s.length; i++) {
            if (s[i] === "\\" && i + 1 < s.length) { cur += s[i] + s[i + 1]; i++; continue; }
            if (s[i] === "|") { cells.push(cur); cur = ""; continue; }
            cur += s[i];
          }
          cells.push(cur);
          return cells.map(c => c.trim());
        };

        const headers = splitRow(lines[start]);
        const aligns = splitRow(lines[start + 1]).map(spec => {
          const l = spec.startsWith(":");
          const r = spec.endsWith(":");
          return l && r ? "center" : r ? "right" : l ? "left" : "";
        });

        const wrap = mdEl("div", "md-table-wrap");
        const table = mdEl("table");
        const thead = mdEl("thead");
        const htr = mdEl("tr");
        headers.forEach((h, idx) => {
          const th = mdEl("th");
          if (aligns[idx]) th.style.textAlign = aligns[idx];
          renderInline(th, h);
          htr.appendChild(th);
        });
        thead.appendChild(htr);
        table.appendChild(thead);

        const tbody = mdEl("tbody");
        let i = start + 2;
        while (i < lines.length && lines[i].includes("|") && !/^\s*$/.test(lines[i])) {
          const cells = splitRow(lines[i]);
          const tr = mdEl("tr");
          for (let c = 0; c < headers.length; c++) {
            const td = mdEl("td");
            if (aligns[c]) td.style.textAlign = aligns[c];
            renderInline(td, cells[c] || "");
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
          i++;
        }
        table.appendChild(tbody);
        wrap.appendChild(table);
        parent.appendChild(wrap);
        return i;
      }

      // Block pass. `nested` is set when rendering list-item children so a
      // heading inside a list doesn't grow a giant top margin.
      function renderMarkdownInto(container, markdown, nested) {
        if (!nested) container.textContent = "";
        const lines = String(markdown == null ? "" : markdown)
          .replace(/\r\n?/g, "\n")
          .split("\n");
        let i = 0;

        while (i < lines.length) {
          const line = lines[i];

          if (/^\s*$/.test(line)) { i++; continue; }

          const fence = RE_FENCE.exec(line);
          if (fence) {
            const marker = fence[2][0];
            const fenceLen = fence[2].length;
            const lang = fence[3].trim();
            const closer = new RegExp("^\\s*\\" + marker + "{" + fenceLen + ",}\\s*$");
            i++;
            const code = [];
            while (i < lines.length && !closer.test(lines[i])) { code.push(lines[i]); i++; }
            if (i < lines.length) i++; // consume closing fence
            const pre = mdEl("pre", "md-pre");
            if (lang) pre.setAttribute("data-lang", lang.split(/\s+/)[0]);
            const codeEl = mdEl("code");
            codeEl.textContent = code.join("\n");
            pre.appendChild(codeEl);
            container.appendChild(pre);
            continue;
          }

          const heading = RE_HEADING.exec(line);
          if (heading) {
            const h = mdEl("h" + heading[1].length);
            renderInline(h, heading[2]);
            container.appendChild(h);
            i++;
            continue;
          }

          if (RE_HR.test(line)) { container.appendChild(mdEl("hr")); i++; continue; }

          if (RE_QUOTE.test(line)) {
            const quote = [];
            while (i < lines.length && RE_QUOTE.test(lines[i])) {
              quote.push(lines[i].replace(/^\s{0,3}>\s?/, ""));
              i++;
            }
            const bq = mdEl("blockquote");
            renderMarkdownInto(bq, quote.join("\n"), true);
            container.appendChild(bq);
            continue;
          }

          if (line.includes("|") && i + 1 < lines.length && RE_TABLE_SEP.test(lines[i + 1])) {
            i = parseTable(lines, i, container);
            continue;
          }

          if (RE_LIST_ITEM.test(line)) {
            i = parseList(lines, i, container);
            continue;
          }

          const para = [];
          while (i < lines.length && !isBlockInterrupt(lines[i], lines[i + 1])) {
            para.push(lines[i]);
            i++;
          }
          const p = mdEl("p");
          para.forEach((pl, idx) => {
            const hard = /( {2,}|\\)$/.test(pl);
            renderInline(p, pl.replace(/( {2,}|\\)\s*$/, ""));
            if (idx < para.length - 1) {
              p.appendChild(hard ? mdEl("br") : document.createTextNode(" "));
            }
          });
          container.appendChild(p);
        }
      }

      // --- stall / narrative --------------------------------------------------

      function isStalled(agent) {
        if (agent.status !== "running") return false;
        const last = parseTime(agent.lastActivityAt || agent.startedAt);
        const threshold = state.config.stallThresholdMs || 120000;
        return last > 0 && Date.now() - last > threshold;
      }

      function usingNarrative(agent, stalled) {
        return !stalled && Boolean(agent.narrative) && agent.narrativeAt &&
          Date.now() - parseTime(agent.narrativeAt) < NARRATIVE_FRESH_MS;
      }

      function applyRunningStatus(node, agent) {
        const stalled = isStalled(agent);
        const dot = node.querySelector(".pulse-dot");
        if (dot) dot.classList.toggle("stall", stalled);
        const activityEl = node.querySelector(".activity");
        if (!activityEl) return;
        const showNarrative = usingNarrative(agent, stalled);
        activityEl.classList.toggle("narrative", showNarrative);
        if (stalled) {
          activityEl.textContent = `stalled · ${elapsed(agent.lastActivityAt || agent.startedAt)}`;
        } else if (showNarrative) {
          activityEl.textContent = agent.narrative;
        } else {
          activityEl.textContent = agent.currentActivity || "starting";
        }
      }

      // --- collisions -----------------------------------------------------

      function computeCollisions(agents) {
        const counts = new Map();
        for (const agent of agents) {
          if (agent.status !== "running") continue;
          for (const file of new Set(agent.files || [])) {
            counts.set(file, (counts.get(file) || 0) + 1);
          }
        }
        const collisions = new Set();
        for (const [file, n] of counts) if (n >= 2) collisions.add(file);
        return collisions;
      }

      // --- capability chips (§26) --------------------------------------------

      function capChipNode(cap) {
        const kind = cap.kind === "skill" ? "skill" : "mcp";
        const chip = document.createElement("span");
        chip.className = `file-chip cap-chip cap-${kind}`;
        if (kind === "mcp") {
          chip.insertAdjacentHTML("afterbegin", MCP_ICON);
          chip.append(document.createTextNode(cap.name));
        } else {
          chip.textContent = `${CAP_GLYPH[kind] || ""} ${cap.name}`.trim();
        }
        chip.title = `${kind}: ${cap.name}`;
        return chip;
      }

      function renderFiles(container, agent, collisions) {
        const caps = agent.capabilities || [];
        const files = agent.files || [];
        container.innerHTML = "";
        if (!caps.length && !files.length) {
          const span = document.createElement("span");
          span.className = "file-empty";
          span.textContent = "no files touched";
          container.append(span);
          return;
        }
        // Capability chips render first, sharing the row's ≤3-visible + +N
        // overflow budget with file chips (total across both kinds).
        const budget = 3;
        const shownCaps = caps.slice(0, budget);
        const shownFiles = files.slice(0, Math.max(0, budget - shownCaps.length));
        for (const cap of shownCaps) container.append(capChipNode(cap));
        for (const file of shownFiles) {
          const chip = document.createElement("span");
          chip.className = "file-chip";
          chip.textContent = basename(file);
          chip.title = file;
          if (agent.status === "running" && collisions.has(file)) chip.classList.add("collision");
          container.append(chip);
        }
        const overflow = (caps.length + files.length) - (shownCaps.length + shownFiles.length);
        if (overflow > 0) {
          const chip = document.createElement("span");
          chip.className = "file-chip file-more";
          chip.textContent = `+${overflow}`;
          container.append(chip);
        }
      }

      function renderStepTag(node, agent, plan) {
        const tag = node.querySelector(".step-tag");
        const idx = stepIndex(plan, agent.stepId);
        if (agent.stepId && idx >= 0) {
          tag.hidden = false;
          tag.textContent = `S${idx + 1}`;
        } else {
          tag.hidden = true;
        }
      }

      function renderTokensBadge(node, agent) {
        const badge = node.querySelector(".tokens-badge");
        if (!badge) return;
        if (agent.tokens == null) {
          badge.hidden = true;
          return;
        }
        badge.hidden = false;
        const total = (agent.tokens.in || 0) + (agent.tokens.out || 0);
        badge.textContent = fmtTokens(total);
        badge.title = tokensTitle(agent.tokens);
      }

      // --- plan rail --------------------------------------------------------

      // Structured outline for the rail: headings become sections, list items
      // (with task state + nesting depth) hang under them. Prose and code are
      // skipped — the rail is a scannable table of contents, the modal is the
      // full read.
      function railOutline(markdown) {
        const out = [];
        const lines = String(markdown || "").replace(/\r\n?/g, "\n").split("\n");
        let inFence = false;
        for (const raw of lines) {
          if (/^\s*(`{3,}|~{3,})/.test(raw)) { inFence = !inFence; continue; }
          if (inFence) continue;
          const h = /^\s{0,3}(#{1,6})\s+(.*?)\s*#*\s*$/.exec(raw);
          if (h) {
            out.push({ type: "heading", level: h[1].length, text: stripInlineMd(h[2]).trim() });
            continue;
          }
          const li = /^(\s*)([-*+]|\d{1,9}[.)])\s+(.*)$/.exec(raw);
          if (li) {
            const indent = li[1].replace(/\t/g, "  ").length;
            let text = li[3];
            let checked = null;
            const task = /^\[([ xX])\]\s+(.*)$/.exec(text);
            if (task) { checked = /[xX]/.test(task[1]); text = task[2]; }
            text = stripInlineMd(text).trim();
            if (text) out.push({ type: "item", depth: Math.min(2, Math.floor(indent / 2)), text, checked });
          }
        }
        return out;
      }

      function buildRailOpenButton() {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "rail-open";
        btn.innerHTML =
          '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 2.5H3.2a.7.7 0 0 0-.7.7V13a.7.7 0 0 0 .7.7h9.6a.7.7 0 0 0 .7-.7v-2.8"></path><path d="M9.5 2.5H13.5V6.5"></path><path d="M13 3 7.5 8.5"></path></svg>';
        btn.append(document.createTextNode("Open full plan"));
        btn.addEventListener("click", event => {
          event.stopPropagation();
          openPlanModal();
        });
        return btn;
      }

      function renderRail(session) {
        const plan = currentPlan(session);
        const narrow = window.innerWidth < 900;
        const hasPlan = Boolean(plan && (((plan.steps || []).length) || plan.doc));
        const visible = !narrow && hasPlan;
        els.rail.style.display = visible ? "flex" : "none";
        els.rail.setAttribute("aria-hidden", visible ? "false" : "true");
        if (!visible) return;

        // §28a: below 1069px the rail auto-collapses (same visual/state the
        // user toggle produces) so the 820px-min-width stage never forces a
        // horizontal scrollbar. The stored preference is left untouched, so
        // widening back past 1069px restores whatever the user last chose.
        const forceCollapsed = window.innerWidth < 1069;
        const collapsed = forceCollapsed || localStorage.getItem("fleet.railCollapsed") === "1";
        els.rail.classList.toggle("collapsed", collapsed);
        els.railToggle.textContent = collapsed ? "›" : "‹";
        els.railToggle.setAttribute("aria-expanded", String(!collapsed));

        els.railBody.innerHTML = "";
        // The whole peek opens the full plan modal (§33); the expand button in
        // the head is the explicit affordance, but the rows invite the click.
        els.railBody.classList.toggle("clickable", Boolean(plan.doc));
        const steps = plan.steps || [];
        if (steps.length) {
          steps.forEach((step, i) => {
            const row = document.createElement("div");
            row.className = "rail-row";
            const dot = document.createElement("span");
            const status = step.status === "done" ? "done" : step.status === "active" ? "active" : "pending";
            dot.className = `rail-dot ${status}`;
            if (status === "done") dot.textContent = "✓";
            const subject = document.createElement("span");
            subject.className = "rail-subject";
            subject.textContent = step.subject || "(untitled step)";
            const index = document.createElement("span");
            index.className = "rail-index";
            index.textContent = String(i + 1);
            row.append(dot, subject, index);
            els.railBody.append(row);
          });
        } else if (plan.doc) {
          const outline = railOutline(plan.doc).slice(0, 80);
          const container = document.createElement("div");
          container.className = "rail-outline";
          outline.forEach(node => {
            if (node.type === "heading") {
              const row = document.createElement("div");
              row.className = "rail-sec" + (node.level === 1 ? " title" : node.level >= 3 ? " sub" : "");
              const text = document.createElement("span");
              text.className = "rail-sec-text";
              text.textContent = node.text;
              row.append(text);
              container.append(row);
            } else {
              const row = document.createElement("div");
              row.className = `rail-item depth${node.depth}`;
              if (node.checked !== null) {
                const box = document.createElement("span");
                box.className = "rail-check" + (node.checked ? " done" : "");
                box.setAttribute("aria-hidden", "true");
                if (node.checked) box.textContent = "✓";
                row.append(box);
              } else {
                const bullet = document.createElement("span");
                bullet.className = "rail-bullet";
                row.append(bullet);
              }
              const text = document.createElement("span");
              text.className = "rail-item-text" + (node.checked ? " done" : "");
              text.textContent = node.text;
              row.append(text);
              container.append(row);
            }
          });
          if (!outline.length) {
            const empty = document.createElement("div");
            empty.className = "rail-item";
            const text = document.createElement("span");
            text.className = "rail-item-text";
            text.textContent = "A plan is ready.";
            empty.append(text);
            container.append(empty);
          }
          els.railBody.append(container);
        }

        // A doc always earns the explicit opener (steps mode included, when the
        // session also has an ExitPlanMode doc behind the live tracker).
        if (plan.doc) els.railBody.append(buildRailOpenButton());
      }

      els.railToggle.addEventListener("click", () => {
        const collapsed = localStorage.getItem("fleet.railCollapsed") === "1";
        localStorage.setItem("fleet.railCollapsed", collapsed ? "0" : "1");
        renderAll();
      });

      // --- plan modal (§33) -------------------------------------------------

      function autoOpenEnabled() {
        return localStorage.getItem("fleet.planAutoOpen") !== "0";
      }

      function planModalOpen() {
        return els.planModal.classList.contains("open");
      }

      // Render steps as a checklist when a plan has structured steps but no
      // ExitPlanMode doc (e.g. a TaskCreate/TaskUpdate-only plan).
      function renderStepsInto(container, steps) {
        container.textContent = "";
        const ul = mdEl("ul", "md-list");
        steps.forEach(step => {
          const li = mdEl("li", "md-task");
          const done = step.status === "done";
          const active = step.status === "active";
          const box = mdEl("span", "md-check" + (done ? " done" : active ? " active" : ""));
          box.setAttribute("aria-hidden", "true");
          if (done) box.textContent = "✓";
          const text = mdEl("span", "md-li-text");
          text.textContent = step.subject || "(untitled step)";
          li.append(box, text);
          ul.appendChild(li);
        });
        container.appendChild(ul);
      }

      function renderPlanModal() {
        const sid = state.planModalSessionId;
        const plan = sid ? state.plans.get(sid) : null;
        const session = sid ? state.sessions.get(sid) : null;

        els.planSub.textContent = session
          ? sessionLabel(session, false)
          : (sid ? String(sid).slice(0, 8) : "");

        const on = autoOpenEnabled();
        els.planAutoToggle.classList.toggle("on", on);
        els.planAutoToggle.setAttribute("aria-pressed", String(on));

        const doc = plan && plan.doc ? plan.doc : "";
        if (doc) {
          // Only re-parse when the markdown actually changed — renderAll and
          // live plan/session broadcasts call through here constantly.
          if (state.planModalDoc !== doc) {
            renderMarkdownInto(els.planBody, doc);
            state.planModalDoc = doc;
          }
          els.planCopy.hidden = false;
        } else if (plan && (plan.steps || []).length) {
          renderStepsInto(els.planBody, plan.steps);
          state.planModalDoc = null;
          els.planCopy.hidden = true;
        } else {
          els.planBody.textContent = "";
          const empty = mdEl("p", "plan-empty");
          empty.textContent = "No plan yet for this session.";
          els.planBody.appendChild(empty);
          state.planModalDoc = null;
          els.planCopy.hidden = true;
        }
      }

      function openPlanModal(sessionId) {
        const sid = sessionId || (activeSession() && activeSession().id);
        if (!sid) return;
        state.planModalSessionId = sid;
        state.planModalDoc = null; // force a fresh parse for the new target
        els.planModal.classList.add("open");
        els.planModal.setAttribute("aria-hidden", "false");
        renderPlanModal();
        els.planClose.focus();
      }

      function closePlanModal() {
        state.planModalSessionId = null;
        state.planModalDoc = null;
        els.planModal.classList.remove("open");
        els.planModal.setAttribute("aria-hidden", "true");
      }

      function copyPlanMarkdown() {
        const sid = state.planModalSessionId;
        const plan = sid ? state.plans.get(sid) : null;
        const doc = plan && plan.doc ? plan.doc : "";
        if (!doc || !navigator.clipboard || !navigator.clipboard.writeText) return;
        navigator.clipboard.writeText(doc).then(() => {
          const original = els.planCopy.textContent;
          els.planCopy.textContent = "Copied";
          els.planCopy.classList.add("on");
          setTimeout(() => {
            els.planCopy.textContent = original;
            els.planCopy.classList.remove("on");
          }, 1400);
        }).catch(() => {});
      }

      els.planOpen.addEventListener("click", () => openPlanModal());
      els.railExpand.addEventListener("click", event => {
        event.stopPropagation();
        openPlanModal();
      });
      els.railBody.addEventListener("click", () => {
        if (currentPlan(activeSession())) openPlanModal();
      });
      els.planClose.addEventListener("click", closePlanModal);
      els.planBackdrop.addEventListener("click", closePlanModal);
      els.planCopy.addEventListener("click", copyPlanMarkdown);
      els.planAutoToggle.addEventListener("click", () => {
        localStorage.setItem("fleet.planAutoOpen", autoOpenEnabled() ? "0" : "1");
        renderPlanModal();
      });

      // --- drawer -----------------------------------------------------------

      function logEntryNode(entry) {
        const row = document.createElement("div");
        row.className = "log-row" + (entry.error ? " error" : "");
        const text = document.createElement("span");
        text.className = "log-text";
        const parts = [entry.tool || ""];
        if (entry.hint) parts.push(entry.hint);
        if (entry.file) parts.push(`(${basename(entry.file)})`);
        text.textContent = parts.filter(Boolean).join(" · ");
        row.append(text);
        if (entry.ms != null) {
          const ms = document.createElement("span");
          ms.className = "log-ms";
          ms.textContent = `${entry.ms}ms`;
          row.append(ms);
        }
        return row;
      }

      function renderDrawerLog(entries) {
        els.drawerLog.innerHTML = "";
        if (!entries.length) {
          const empty = document.createElement("div");
          empty.className = "log-empty";
          empty.textContent = "No activity yet.";
          els.drawerLog.append(empty);
          return;
        }
        entries.forEach(entry => els.drawerLog.append(logEntryNode(entry)));
        els.drawerLog.scrollTop = els.drawerLog.scrollHeight;
      }

      function appendLogEntry(entry) {
        const empty = els.drawerLog.querySelector(".log-empty");
        if (empty) empty.remove();
        els.drawerLog.append(logEntryNode(entry));
        els.drawerLog.scrollTop = els.drawerLog.scrollHeight;
      }

      // §31.4: true when the drawer is currently open on the given target
      // (kind + id) -- used to gate live-append / re-render against stray
      // fetches or SSE messages for a target the user has since navigated
      // away from.
      function drawerTargetIs(kind, id) {
        return Boolean(state.drawerTarget) && state.drawerTarget.kind === kind && state.drawerTarget.id === id;
      }

      function renderDrawerCapsRow(caps) {
        els.drawerCaps.innerHTML = "";
        if (caps.length) {
          caps.forEach(cap => els.drawerCaps.append(capChipNode(cap)));
          els.drawerCaps.hidden = false;
        } else {
          els.drawerCaps.hidden = true;
        }
      }

      function renderDrawerTokens(tokens, costUsd) {
        if (tokens == null) {
          els.drawerTokens.hidden = true;
          return;
        }
        els.drawerTokens.hidden = false;
        els.drawerTokensIn.textContent = fmtInt(tokens.in);
        els.drawerTokensOut.textContent = fmtInt(tokens.out);
        els.drawerTokensCacheRead.textContent = fmtInt(tokens.cacheRead);
        els.drawerTokensCacheWrite.textContent = fmtInt(tokens.cacheWrite);
        if (costUsd != null) {
          els.drawerTokensCost.hidden = false;
          els.drawerTokensCost.textContent = `est. ${fmtUsd(costUsd)}`;
        } else {
          els.drawerTokensCost.hidden = true;
        }
      }

      function renderDrawerHeader() {
        const target = state.drawerTarget;
        if (!target) return;
        if (target.kind === "session") {
          const session = state.sessions.get(target.id);
          if (!session) return;
          // Sessions carry no provider tag (only agents do, via discovery /
          // spawn payloads) -- same anthropic-default idiom as an agent
          // with an unknown provider (see accent()/LOGOS lookups below).
          els.drawerImg.src = LOGOS.anthropic;
          els.drawerLabel.textContent = state.config.hubTitle || "Orchestrator";
          if (session.model) {
            els.drawerModel.hidden = false;
            els.drawerModel.textContent = session.model;
          } else {
            els.drawerModel.hidden = true;
            els.drawerModel.textContent = "";
          }
          const statusText = session.turnActive ? "active" : session.ended ? "ended" : "idle";
          els.drawerStatus.textContent = statusText;
          els.drawerStatus.classList.toggle("done", statusText === "ended");
          els.drawer.style.setProperty("--accent", "var(--anthropic)");
          els.drawerSpawned.hidden = true;
          els.drawerDesc.textContent = session.cwd || "Working in the session";
          renderDrawerCapsRow(session.capabilities || []);
          // Sessions have no `files` concept (only agents track file
          // touches) -- hide the row rather than claim "no files touched".
          els.drawerFiles.innerHTML = "";
          els.drawerFiles.hidden = true;
          els.drawerFinal.hidden = true;
          renderDrawerTokens(session.tokens, session.costUsd);
          return;
        }
        const agent = state.agents.get(target.id);
        if (!agent) return;
        els.drawerImg.src = LOGOS[agent.provider] || LOGOS.anthropic;
        els.drawerLabel.textContent = agent.label || agent.agentType || "Agent";
        els.drawerModel.hidden = false;
        els.drawerModel.textContent = agent.model || "Claude";
        const isDone = agent.status === "done";
        els.drawerStatus.textContent = isDone ? "done" : "running";
        els.drawerStatus.classList.toggle("done", isDone);
        // §24: same custom accent this agent's card uses, so drawer mcp chips
        // (see .cap-mcp) pick up the matching provider tint.
        els.drawer.style.setProperty("--accent", accent(agent));
        const parentId = agent.parentId;
        const parent = parentId && parentId !== agent.id ? state.agents.get(parentId) : null;
        if (parent) {
          els.drawerSpawned.hidden = false;
          els.drawerSpawned.textContent = `spawned by ${parent.label || parent.agentType || "agent"}`;
        } else {
          els.drawerSpawned.hidden = true;
        }
        els.drawerDesc.textContent = agent.description || "Working in the session";
        renderDrawerCapsRow(agent.capabilities || []);
        els.drawerFiles.hidden = false;
        els.drawerFiles.innerHTML = "";
        const files = agent.files || [];
        if (!files.length) {
          const span = document.createElement("span");
          span.className = "file-empty";
          span.textContent = "no files touched";
          els.drawerFiles.append(span);
        } else {
          files.forEach(file => {
            const chip = document.createElement("span");
            chip.className = "file-chip";
            chip.textContent = basename(file);
            chip.title = file;
            els.drawerFiles.append(chip);
          });
        }
        if (isDone && agent.finalMessage) {
          els.drawerFinal.hidden = false;
          els.drawerFinal.textContent = agent.finalMessage;
        } else {
          els.drawerFinal.hidden = true;
        }
        renderDrawerTokens(agent.tokens, agent.costUsd);
      }

      function openDrawer(target) {
        if (!target || !target.id) return;
        state.drawerTarget = target;
        els.drawer.classList.add("open");
        els.drawer.setAttribute("aria-hidden", "false");
        renderDrawerHeader();
        els.drawerLog.innerHTML = "";
        const loading = document.createElement("div");
        loading.className = "log-empty";
        loading.textContent = "Loading…";
        els.drawerLog.append(loading);
        const endpoint = target.kind === "session"
          ? `/sessions/${encodeURIComponent(target.id)}/log`
          : `/agents/${encodeURIComponent(target.id)}/log`;
        fetch(endpoint)
          .then(r => r.json())
          .then(data => {
            if (!drawerTargetIs(target.kind, target.id)) return;
            renderDrawerLog(data.entries || []);
          })
          .catch(() => {
            if (!drawerTargetIs(target.kind, target.id)) return;
            els.drawerLog.innerHTML = "";
            const failed = document.createElement("div");
            failed.className = "log-empty";
            failed.textContent = "Failed to load log.";
            els.drawerLog.append(failed);
          });
      }

      function closeDrawer() {
        state.drawerTarget = null;
        els.drawer.classList.remove("open");
        els.drawer.setAttribute("aria-hidden", "true");
      }

      els.drawerClose.addEventListener("click", closeDrawer);
      document.addEventListener("keydown", event => {
        if (event.key !== "Escape") return;
        // The plan modal sits above the drawer, so it wins the first Escape.
        if (planModalOpen()) { closePlanModal(); return; }
        if (state.drawerTarget) closeDrawer();
      });
      document.addEventListener("click", event => {
        if (!state.drawerTarget) return;
        if (els.drawer.contains(event.target)) return;
        if (els.planModal.contains(event.target)) return;
        if (event.target.closest(".agent")) return;
        if (event.target.closest(".hub")) return;
        closeDrawer();
      });
      els.hub.addEventListener("click", () => {
        const session = activeSession();
        if (session) openDrawer({ kind: "session", id: session.id });
      });

      // --- notifications ------------------------------------------------------

      function notifySupported() {
        return typeof Notification !== "undefined";
      }

      function renderBell() {
        const supported = notifySupported();
        const denied = supported && Notification.permission === "denied";
        const on = supported && Notification.permission === "granted" && localStorage.getItem("fleet.notify") === "1";
        els.notifyToggle.classList.toggle("on", on);
        const disabled = !supported || denied;
        els.notifyToggle.classList.toggle("disabled", disabled);
        els.notifyToggle.disabled = disabled;
        els.notifyToggle.setAttribute("aria-pressed", String(on));
      }

      els.notifyToggle.addEventListener("click", () => {
        if (!notifySupported() || Notification.permission === "denied") return;
        const enabling = localStorage.getItem("fleet.notify") !== "1";
        if (enabling && Notification.permission !== "granted") {
          Notification.requestPermission().then(() => {
            localStorage.setItem("fleet.notify", Notification.permission === "granted" ? "1" : "0");
            renderBell();
          });
          return;
        }
        localStorage.setItem("fleet.notify", enabling ? "1" : "0");
        renderBell();
      });

      function maybeNotify(session) {
        if (localStorage.getItem("fleet.notify") !== "1") return;
        if (!notifySupported() || Notification.permission !== "granted") return;
        if (!document.hidden) return;
        new Notification("Turn finished", {
          body: `${basename(session.cwd)} · ${String(session.id).slice(0, 8)}`,
          tag: session.id
        });
      }

      // --- snapshot / fleet event handling --------------------------------

      function replaceSnapshot(msg) {
        closeDrawer();
        state.sessions = new Map();
        state.agents = new Map();
        state.plans = new Map();
        state.config = Object.assign({ hubTitle: "Orchestrator", stallThresholdMs: 120000 }, msg.config || {});
        state.prevTurnActive = new Map();
        state.lastSeenErrorAt = new Map();
        state.pendingErrorFlick = new Set();
        (msg.sessions || []).forEach(upsertSession);
        (msg.agents || []).forEach(upsertAgent);
        (msg.plans || []).forEach(plan => {
          if (plan?.sessionId) state.plans.set(plan.sessionId, plan);
        });
        // §33: seed seenPlanDocs from the snapshot so a page load or reconnect
        // never re-pops the modal for a plan that already existed — only plans
        // that arrive *after* this point count as newly created.
        state.seenPlanDocs = new Map();
        for (const plan of state.plans.values()) {
          if (plan && plan.doc && plan.sessionId) state.seenPlanDocs.set(plan.sessionId, plan.doc);
        }
        closePlanModal();
        for (const session of state.sessions.values()) {
          state.prevTurnActive.set(session.id, Boolean(session.turnActive));
        }
        for (const agent of state.agents.values()) {
          if (agent.lastErrorAt) state.lastSeenErrorAt.set(agent.id, parseTime(agent.lastErrorAt));
        }
        if (state.selected !== FOLLOW && !state.sessions.has(state.selected)) {
          state.selected = FOLLOW;
        }
        renderAll();
      }

      function applyFleet(msg) {
        if (msg.type === "plan" && msg.plan?.sessionId) {
          const sid = msg.plan.sessionId;
          state.plans.set(sid, msg.plan);
          // §33: auto-open the plan modal the first time a session's plan.doc
          // appears or changes. plan.step updates re-broadcast the same doc, so
          // we compare against the last doc seen and only pop on a real change.
          const doc = msg.plan.doc || "";
          const prevDoc = state.seenPlanDocs.get(sid) || "";
          const docChanged = Boolean(doc) && doc !== prevDoc;
          if (doc !== prevDoc) state.seenPlanDocs.set(sid, doc);
          // Only steal focus for the session the user is actually watching:
          // FOLLOW (latest) surfaces every new plan; a pinned session surfaces
          // only its own — a background session's plan never interrupts.
          const relevant = state.selected === FOLLOW || state.selected === sid;
          if (docChanged && autoOpenEnabled() && relevant) {
            openPlanModal(sid);
          } else if (planModalOpen() && state.planModalSessionId === sid) {
            renderPlanModal();
          }
        }
        if (msg.type === "activity" && msg.agentId && msg.entry && drawerTargetIs("agent", msg.agentId)) {
          appendLogEntry(msg.entry);
        }
        // §31.3: session-activity is the session-level analogue of the
        // agent `activity` SSE message above -- live-append when the
        // session drawer is open on the matching session.
        if (msg.type === "session-activity" && msg.sessionId && msg.entry && drawerTargetIs("session", msg.sessionId)) {
          appendLogEntry(msg.entry);
        }
        if (msg.session) {
          const prevActive = state.prevTurnActive.get(msg.session.id);
          upsertSession(msg.session);
          if (prevActive === true && msg.session.turnActive === false) {
            maybeNotify(msg.session);
          }
          state.prevTurnActive.set(msg.session.id, Boolean(msg.session.turnActive));
          if (drawerTargetIs("session", msg.session.id)) renderDrawerHeader();
          if (planModalOpen() && state.planModalSessionId === msg.session.id) renderPlanModal();
        }
        if (msg.agent) {
          const errAt = msg.agent.lastErrorAt ? parseTime(msg.agent.lastErrorAt) : 0;
          const seenAt = state.lastSeenErrorAt.get(msg.agent.id) || 0;
          if (errAt && errAt > seenAt) state.pendingErrorFlick.add(msg.agent.id);
          if (errAt) state.lastSeenErrorAt.set(msg.agent.id, errAt);
          upsertAgent(msg.agent);
          if (drawerTargetIs("agent", msg.agent.id)) renderDrawerHeader();
        }
        if (state.selected !== FOLLOW && !state.sessions.has(state.selected)) {
          state.selected = FOLLOW;
        }
        renderAll();
      }

      // §32.4: a session is named by its own title once the enricher has read
      // one out of the transcript, falling back to today's cwd · id8 while it
      // hasn't (blank-until-known, per §31.2's rule for model). Titles aren't
      // unique — two live sessions really can share one — so a title that
      // collides with another *visible* session's earns an id suffix, and
      // only then.
      function sessionLabel(session, ambiguous) {
        if (!session.title) return `${basename(session.cwd)} · ${String(session.id).slice(0, 8)}`;
        const mode = ambiguous.get(session.title);
        if (!mode) return session.title;
        return `${session.title} · ${mode === "full" ? session.id : String(session.id).slice(0, 8)}`;
      }

      // Titles that more than one visible session claims, mapped to how much
      // of the id it takes to tell them apart. Claude session ids are UUIDs so
      // 8 chars is always enough; ids that share a prefix (a codex "codex:x"
      // namespace, say) fall back to the whole thing rather than rendering two
      // identical options.
      function ambiguousTitles(sessions) {
        const byTitle = new Map();
        for (const session of sessions) {
          if (!session.title) continue;
          if (!byTitle.has(session.title)) byTitle.set(session.title, []);
          byTitle.get(session.title).push(String(session.id));
        }
        const ambiguous = new Map();
        for (const [title, ids] of byTitle) {
          if (ids.length < 2) continue;
          const shortEnough = new Set(ids.map(id => id.slice(0, 8))).size === ids.length;
          ambiguous.set(title, shortEnough ? "short" : "full");
        }
        return ambiguous;
      }

      function renderPicker() {
        const sessions = sortedSessions();
        const previous = state.selected;
        const ambiguous = ambiguousTitles(sessions);
        els.picker.replaceChildren(new Option("Follow latest", FOLLOW));
        for (const session of sessions) {
          const label = sessionLabel(session, ambiguous);
          const option = new Option(label, session.id);
          option.title = label; // the select is width-capped; full text on hover
          els.picker.add(option);
        }
        els.picker.value = sessions.some(s => s.id === previous) ? previous : FOLLOW;
      }

      // §31.4: hub capability-chips row — mirrors renderFiles' ≤3-visible +
      // `+N` overflow budget but capabilities-only; unlike renderFiles this
      // has no "no files touched" empty case (an empty row just renders
      // empty, per the fixed-height/always-rendered contract above).
      function renderHubCaps(caps) {
        els.hubCaps.innerHTML = "";
        const budget = 3;
        const shown = caps.slice(0, budget);
        for (const cap of shown) els.hubCaps.append(capChipNode(cap));
        const overflow = caps.length - shown.length;
        if (overflow > 0) {
          const chip = document.createElement("span");
          chip.className = "file-chip file-more";
          chip.textContent = `+${overflow}`;
          els.hubCaps.append(chip);
        }
      }

      function renderChrome(session, agents, collisions) {
        const running = agents.filter(agent => agent.status === "running").length;
        els.running.textContent = `${running} running`;
        els.collisionChip.style.display = collisions.size > 0 ? "flex" : "none";
        // §33: the top-bar Plan button is the always-visible manual opener —
        // it survives the <900px breakpoint that hides the rail entirely.
        const sessionPlan = session ? state.plans.get(session.id) : null;
        els.planOpen.hidden = !(sessionPlan && (sessionPlan.doc || (sessionPlan.steps || []).length));
        els.hub.classList.toggle("active", Boolean(session?.turnActive));
        els.hub.classList.toggle("ended", Boolean(session?.ended));
        const hubTitle = state.config.hubTitle || "Orchestrator";
        els.hubTitle.textContent = hubTitle;
        els.hub.setAttribute("aria-label", `${hubTitle} orchestrator`);
        const cwdBase = session ? basename(session.cwd) : "No session";
        // §31.2/§31.4: session.model arrives server-prettified — render
        // verbatim, no client prettify. Blank-until-known.
        els.hubSubtitleText.textContent = hubTitle === "Orchestrator"
          ? (session?.model ? `${session.model} · ${cwdBase}` : cwdBase)
          : `Orchestrator · ${cwdBase}`;
        const sessionTokens = session?.tokens;
        if (sessionTokens == null) {
          els.hubTokens.hidden = true;
        } else {
          els.hubTokens.hidden = false;
          const total = (sessionTokens.in || 0) + (sessionTokens.out || 0);
          els.hubTokens.textContent = fmtTokens(total);
          let title = tokensTitle(sessionTokens);
          if (session.costUsd != null) title += ` · est. ${fmtUsd(session.costUsd)}`;
          els.hubTokens.title = title;
        }
        // §25/§31.1: orchestrator activity readout under the subtitle —
        // shown only while the session is mid-turn and has a live activity
        // (persists through spawns via the delegate synthesis in §31.1).
        const activity = session?.turnActive ? session.currentActivity : null;
        if (activity && activity.tool) {
          const text = activity.hint ? `${activity.tool}: ${activity.hint}` : activity.tool;
          els.hubActivity.textContent = text;
          els.hubActivity.title = text;
          els.hubActivity.classList.add("show");
        } else {
          els.hubActivity.classList.remove("show");
          els.hubActivity.textContent = "";
          els.hubActivity.removeAttribute("title");
        }
        renderHubCaps(session?.capabilities || []);
        els.empty.hidden = agents.length > 0;
        if (!els.empty.hidden) {
          // §31.4: same turnActive && currentActivity gate as the activity
          // line above (previously ungated on turnActive).
          els.empty.textContent = activity ? EMPTY_WORKING_TEXT : EMPTY_IDLE_TEXT;
        }
      }

      function setConnection(open) {
        state.connected = open;
        els.liveDot.classList.toggle("open", open);
        els.liveLabel.textContent = open ? "live" : "reconnecting";
      }

      function ensureNode(agent) {
        let node = nodes.get(agent.id);
        if (node) return node;
        node = document.createElement("article");
        node.className = "agent enter";
        node.dataset.id = agent.id;
        node.innerHTML = `
          <div class="agent-inner">
            <div class="agent-head">
              <span class="brand-chip"><img alt=""><\/span>
              <div class="agent-label"><\/div>
              <span class="step-tag" hidden><\/span>
              <span class="tokens-badge" hidden><\/span>
              <div class="model"><\/div>
            <\/div>
            <div class="description"><\/div>
            <div class="status-line"><\/div>
            <div class="files-row"><\/div>
          <\/div>
        `;
        node.addEventListener("click", () => {
          // §32.3: a drag always ends in a click; swallow exactly that one.
          if (node.dataset.dragged) {
            delete node.dataset.dragged;
            return;
          }
          openDrawer({ kind: "agent", id: node.dataset.id });
        });
        els.agents.append(node);
        nodes.set(agent.id, node);
        setTimeout(() => node.classList.remove("enter"), 280);
        return node;
      }

      function ensurePath(agent) {
        let path = paths.get(agent.id);
        if (path) return path;
        path = document.createElementNS("http" + "://www.w3.org/2000/svg", "path");
        path.dataset.id = agent.id;
        path.classList.add("link", "enter");
        els.links.append(path);
        paths.set(agent.id, path);
        setTimeout(() => path.classList.remove("enter"), 380);
        return path;
      }

      // §32.2: content only — no positioning. Runs before heights are read so
      // the layout pass measures a card that already holds its final content.
      function renderAgentContent(node, agent, index, total, plan, collisions) {
        const isDone = agent.status === "done";
        const doneAge = agent.endedAt ? Date.now() - parseTime(agent.endedAt) : 0;
        node.style.setProperty("--accent", accent(agent));
        node.classList.toggle("dim", isDone && doneAge > 20000);
        node.classList.toggle("fade", isDone && doneAge > 180000);
        node.querySelector(".agent-label").textContent = agent.label || agent.agentType || "Agent";
        node.querySelector(".brand-chip img").src = LOGOS[agent.provider] || LOGOS.anthropic;
        node.querySelector(".model").textContent = agent.model || "Claude";
        node.querySelector(".description").textContent = agent.description || "Working in the session";
        renderStepTag(node, agent, plan);
        renderTokensBadge(node, agent);

        const status = node.querySelector(".status-line");
        const finalElapsed = elapsed(agent.startedAt, agent.endedAt);
        if (isDone) {
          status.className = "status-line done";
          status.innerHTML = `
            <div class="status-top">
              <span class="done-pill">✓<\/span>
              <span class="timer"><\/span>
            <\/div>
            <div class="final-message"><\/div>
          `;
          status.querySelector(".timer").textContent = finalElapsed;
          status.querySelector(".final-message").textContent = agent.finalMessage || "Complete";
        } else {
          status.className = "status-line";
          status.innerHTML = `<span class="pulse-dot"><\/span><span class="activity"><\/span><span class="timer"><\/span>`;
          status.querySelector(".timer").textContent = elapsed(agent.startedAt);
          applyRunningStatus(node, agent);
        }

        renderFiles(node.querySelector(".files-row"), agent, collisions);

        node.dataset.running = isDone ? "false" : "true";
        node.dataset.startedAt = agent.startedAt || "";
        node.dataset.endedAt = agent.endedAt || "";
        node.dataset.index = String(index);
        node.dataset.total = String(total);

        if (state.pendingErrorFlick.has(agent.id)) {
          state.pendingErrorFlick.delete(agent.id);
          node.classList.remove("error-flick");
          void node.offsetWidth;
          node.classList.add("error-flick");
          setTimeout(() => node.classList.remove("error-flick"), 1200);
        }
      }

      function cardX(compact, stageWidth, depth) {
        const base = compact ? 370 : stageWidth * .52;
        return base + indentPx(depth);
      }

      function isCompact() {
        return window.matchMedia("(max-width: 760px)").matches;
      }

      // §32.2: measure, then stack. Every card gets an auto slot (cumulative
      // height + gap, the whole column centred); a manual §32.3 position
      // overrides only where the card is painted, never its slot — which is
      // why dragging one card leaves every other card where it was.
      function computeLayout(agents, depthOf, stageBox, compact) {
        layout.clear();
        const heights = agents.map(agent => {
          const node = nodes.get(agent.id);
          return Math.max(CARD_MIN_H, node ? node.offsetHeight : CARD_MIN_H);
        });
        const stackH = heights.reduce((sum, h) => sum + h, 0) +
          CARD_GAP * Math.max(0, agents.length - 1);

        let lowest = 0;
        for (const pos of state.manual.values()) lowest = Math.max(lowest, pos.y + CARD_MIN_H);
        const minHeight = Math.max(620, stackH + 220, lowest + 120);
        els.stage.style.setProperty("--stage-h", `${minHeight}px`);

        let y = Math.max(110, (minHeight - stackH) / 2);
        agents.forEach((agent, index) => {
          const depth = depthOf.get(agent.id) || 0;
          const auto = { x: cardX(compact, stageBox.width, depth), y };
          const manual = state.manual.get(agent.id);
          layout.set(agent.id, {
            x: manual ? manual.x : auto.x,
            y: manual ? manual.y : auto.y,
            h: heights[index],
            depth
          });
          y += heights[index] + CARD_GAP;
        });
      }

      function applyLayout(node, pos) {
        node.style.setProperty("--x", `${pos.x}px`);
        node.style.setProperty("--y", `${pos.y}px`);
      }

      function renderPath(path, agent, stageBox, compact, parentId) {
        const pos = layout.get(agent.id);
        if (!pos) return;
        const cardLeft = pos.x;
        // §32.1: the measured centre, not CARD_H/2 — links used to meet tall
        // cards above their true middle.
        const cardY = pos.y + pos.h / 2;
        let srcX, srcY, mid;
        const parentPos = parentId ? layout.get(parentId) : null;
        if (parentPos) {
          // §24: source at the parent card's left edge instead of the hub,
          // bowing left so a parent→child link reads distinctly from the
          // shallower hub→card sweep.
          srcX = parentPos.x;
          srcY = parentPos.y + parentPos.h / 2;
          mid = Math.min(srcX, cardLeft) - 36;
        } else {
          srcX = (compact ? 34 : stageBox.width * .08) + HUB_W;
          srcY = stageBox.height / 2;
          mid = srcX + (cardLeft - srcX) * .5;
        }
        const d = `M ${srcX} ${srcY} C ${mid} ${srcY}, ${mid} ${cardY}, ${cardLeft} ${cardY}`;
        const isDone = agent.status === "done";
        const doneAge = agent.endedAt ? Date.now() - parseTime(agent.endedAt) : 0;
        path.setAttribute("d", d);
        path.setAttribute("stroke", isDone ? "#3A4453" : accent(agent));
        path.setAttribute("stroke-width", isDone ? "1.5" : "2");
        path.style.color = isDone ? "#3A4453" : accent(agent);
        path.classList.toggle("running", !isDone);
        path.classList.toggle("done", isDone);
        path.classList.toggle("dim", isDone && doneAge > 20000);
        path.classList.toggle("fade", isDone && doneAge > 180000);
      }

      function removeMissing(visibleIds) {
        for (const [id, node] of nodes) {
          if (visibleIds.has(id)) continue;
          node.classList.add("fade");
          setTimeout(() => node.remove(), 1000);
          nodes.delete(id);
        }
        for (const [id, path] of paths) {
          if (visibleIds.has(id)) continue;
          path.classList.add("fade");
          setTimeout(() => path.remove(), 1000);
          paths.delete(id);
        }
      }

      function renderAll() {
        renderPicker();
        const session = activeSession();
        // §32.3: manual positions are per-session, so follow the active
        // session (which moves on its own in "Follow latest" mode).
        const sessionId = session ? session.id : null;
        if (sessionId !== state.manualSessionId) {
          state.manualSessionId = sessionId;
          loadManual(sessionId);
        }
        const baseAgents = selectedAgents(session);
        const { agents, depthOf, parentOf } = lineageOrder(baseAgents);
        const plan = currentPlan(session);
        const collisions = computeCollisions(agents);
        renderRail(session);
        renderChrome(session, agents, collisions);

        // §32.2: content first, so every card holds its final content before
        // anything measures it; then one layout pass; then paint.
        const visibleIds = new Set();
        agents.forEach((agent, index) => {
          visibleIds.add(agent.id);
          renderAgentContent(ensureNode(agent), agent, index, agents.length, plan, collisions);
        });

        const compact = isCompact();
        computeLayout(agents, depthOf, els.stage.getBoundingClientRect(), compact);
        // Re-read after computeLayout set --stage-h: the hub link anchors to
        // the stage's vertical centre, which just moved.
        const stageBox = els.stage.getBoundingClientRect();

        agents.forEach(agent => {
          const pos = layout.get(agent.id);
          applyLayout(nodes.get(agent.id), pos);
          const parent = parentOf.get(agent.id);
          renderPath(ensurePath(agent), agent, stageBox, compact, parent ? parent.id : null);
        });
        removeMissing(visibleIds);
        state.visible = visibleIds;
        renderResetLayout();
      }

      // §32.3: repaint positions and links without touching content — the
      // per-pointermove path. Content rendering and height measurement are
      // skipped entirely; only the dragged card's layout entry has changed.
      function repositionAll() {
        const session = activeSession();
        const { agents, parentOf } = lineageOrder(selectedAgents(session));
        const compact = isCompact();
        const stageBox = els.stage.getBoundingClientRect();
        for (const agent of agents) {
          const pos = layout.get(agent.id);
          const node = nodes.get(agent.id);
          if (!pos || !node) continue;
          applyLayout(node, pos);
          const path = paths.get(agent.id);
          const parent = parentOf.get(agent.id);
          if (path) renderPath(path, agent, stageBox, compact, parent ? parent.id : null);
        }
      }

      function tickTimers() {
        for (const [id, node] of nodes) {
          const agent = state.agents.get(id);
          if (!agent) continue;
          const isDone = agent.status === "done";
          const doneAge = agent.endedAt ? Date.now() - parseTime(agent.endedAt) : 0;
          node.classList.toggle("dim", isDone && doneAge > 20000);
          node.classList.toggle("fade", isDone && doneAge > 180000);
          const path = paths.get(id);
          path?.classList.toggle("dim", isDone && doneAge > 20000);
          path?.classList.toggle("fade", isDone && doneAge > 180000);
          const timer = node.querySelector(".timer");
          if (timer) timer.textContent = elapsed(agent.startedAt, agent.endedAt);
          if (!isDone) applyRunningStatus(node, agent);
        }
        const session = activeSession();
        const agents = selectedAgents(session);
        if (agents.length !== state.visible.size) renderAll();
      }

      function safeJson(event) {
        try {
          return JSON.parse(event.data);
        } catch {
          return null;
        }
      }

      function connect() {
        const source = new EventSource("/events");
        source.onopen = () => setConnection(true);
        source.onerror = () => setConnection(false);
        source.addEventListener("snapshot", event => {
          const msg = safeJson(event);
          if (msg) replaceSnapshot(msg);
        });
        source.addEventListener("fleet", event => {
          const msg = safeJson(event);
          if (msg) applyFleet(msg);
        });
      }

      // ——— §32.3 card dragging ————————————————————————————————————————
      const drag = { id: null, node: null, pointerId: null, startX: 0, startY: 0, originX: 0, originY: 0, moved: false };

      function clampToStage(x, y, h) {
        const box = els.stage.getBoundingClientRect();
        return {
          x: Math.min(Math.max(8, x), Math.max(8, box.width - 280 - 8)),
          y: Math.min(Math.max(8, y), Math.max(8, box.height - h - 8))
        };
      }

      els.agents.addEventListener("pointerdown", event => {
        if (event.button !== 0) return;
        const node = event.target.closest(".agent");
        if (!node) return;
        const pos = layout.get(node.dataset.id);
        if (!pos) return;
        drag.id = node.dataset.id;
        drag.node = node;
        drag.pointerId = event.pointerId;
        drag.startX = event.clientX;
        drag.startY = event.clientY;
        drag.originX = pos.x;
        drag.originY = pos.y;
        drag.moved = false;
        // Throws if the pointer isn't active (stale id, synthetic event) —
        // the drag still works via the bubbled listeners, just without capture.
        try { node.setPointerCapture(event.pointerId); } catch {}
      });

      els.agents.addEventListener("pointermove", event => {
        if (drag.id === null || event.pointerId !== drag.pointerId) return;
        const dx = event.clientX - drag.startX;
        const dy = event.clientY - drag.startY;
        if (!drag.moved) {
          if (Math.hypot(dx, dy) < DRAG_THRESHOLD) return;
          drag.moved = true;
          drag.node.classList.add("dragging");
        }
        const pos = layout.get(drag.id);
        if (!pos) return;
        const next = clampToStage(drag.originX + dx, drag.originY + dy, pos.h);
        state.manual.set(drag.id, next);
        pos.x = next.x;
        pos.y = next.y;
        repositionAll();
      });

      function endDrag(event) {
        if (drag.id === null || event.pointerId !== drag.pointerId) return;
        if (drag.moved) {
          drag.node.classList.remove("dragging");
          // Consumed and cleared by the card's click handler, so the click
          // that always follows a drag doesn't also open the drawer.
          drag.node.dataset.dragged = "1";
          persistManual(state.manualSessionId);
          renderResetLayout();
        }
        try { drag.node.releasePointerCapture(drag.pointerId); } catch {}
        drag.id = null;
        drag.node = null;
        drag.pointerId = null;
      }

      els.agents.addEventListener("pointerup", endDrag);
      els.agents.addEventListener("pointercancel", endDrag);

      function renderResetLayout() {
        els.resetLayout.hidden = state.manual.size === 0;
      }

      els.resetLayout.addEventListener("click", () => {
        state.manual.clear();
        persistManual(state.manualSessionId);
        renderAll();
      });

      els.picker.addEventListener("change", event => {
        state.selected = event.target.value;
        renderAll();
      });
      window.addEventListener("resize", () => requestAnimationFrame(renderAll));
      setInterval(tickTimers, 1000);
      renderBell();
      renderAll();
      connect();
    })();
  </script>
</body>
</html>
