<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agenticADE Fleet View</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    :root {
      --bg: #0A0C10;
      --card: #151A23;
      --border: #232B38;
      --text: #E6EAF2;
      --muted: #8B94A7;
      --anthropic: #D97757;
      --openai: #19C29D;
      --done: #7BC47F;
      --error: #E5484D;
      --amber: #E8A23D;

      /* agenticADE brand — see brand/README.md */
      --brand: #E11D6B;        /* Cherryade crimson — primary accent */
      --brand-2: #FF5C8A;      /* Fizz pink — highlight / active */
      /* warm charcoal chrome (top bar + rail) to match the brand's dark surface */
      --chrome-surface: rgba(23,22,28,.85);
      --chrome-surface-2: rgba(23,22,28,.55);
      --chrome-inset: rgba(18,17,23,.92);
      --chrome-line: rgba(237,233,242,.10);
      --chrome-line-2: rgba(237,233,242,.16);
      --chrome-edge: color-mix(in srgb, var(--brand) 20%, rgba(237,233,242,.08));

      --radius: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,.35);
      --font: -apple-system, "SF Pro Text", Segoe UI, system-ui, sans-serif;
      --mono: ui-monospace, "SF Mono", Menlo, monospace;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      letter-spacing: 0;
    }

    button,
    select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: 48px 1fr;
      height: 100vh;
      background:
        radial-gradient(circle, rgba(255,255,255,.05) 1px, transparent 1.25px) 0 0 / 24px 24px,
        var(--bg);
    }

    .topbar {
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      height: 48px;
      padding: 0 18px;
      border-bottom: 1px solid var(--chrome-edge);
      background: var(--chrome-surface);
      backdrop-filter: blur(16px);
    }

    .brand,
    .controls,
    .chip,
    .live,
    .hub-title,
    .agent-head,
    .status-line,
    .done-pill {
      display: flex;
      align-items: center;
    }

    .brand {
      min-width: 0;
      gap: 10px;
      font-size: 13px;
      font-weight: 650;
      white-space: nowrap;
    }

    .brandmark {
      display: block;
      height: 24px;
      width: auto;
    }

    .controls {
      gap: 10px;
      min-width: 0;
    }

    .chip {
      height: 26px;
      padding: 0 10px;
      border: 1px solid var(--chrome-line-2);
      border-radius: 999px;
      background: var(--chrome-inset);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .chip.warn {
      color: var(--amber);
      border-color: rgba(232,162,61,.45);
      background: rgba(232,162,61,.1);
    }

    select {
      /* §32.4: session titles are wordier than the old cwd · id8 label. */
      width: min(320px, 38vw);
      height: 28px;
      border: 1px solid var(--chrome-line-2);
      border-radius: 9px;
      background: var(--chrome-inset);
      color: var(--text);
      padding: 0 30px 0 10px;
      font-size: 12px;
      outline: none;
    }

    select:focus {
      border-color: color-mix(in srgb, var(--brand) 55%, transparent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 18%, transparent);
    }

    .bell {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border: 1px solid var(--chrome-line-2);
      border-radius: 9px;
      background: var(--chrome-inset);
      color: var(--muted);
      cursor: pointer;
      padding: 0;
    }

    /* An author `display` beats the UA stylesheet's [hidden] rule, so the
       reset-layout button (§32.3) needs this to actually hide. */
    .bell[hidden] {
      display: none;
    }

    .bell:not(.on):not(:disabled):hover {
      color: var(--brand-2);
      border-color: color-mix(in srgb, var(--brand) 42%, var(--chrome-line-2));
    }

    .bell svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bell.on {
      color: var(--done);
      border-color: rgba(123,196,127,.4);
      background: rgba(123,196,127,.08);
    }

    .bell.on svg {
      fill: currentColor;
    }

    .bell:disabled,
    .bell.disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .live {
      gap: 7px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--error);
      box-shadow: 0 0 0 4px rgba(229,72,77,.12);
      transition: background .2s ease, box-shadow .2s ease;
    }

    .live-dot.open {
      background: var(--done);
      box-shadow: 0 0 0 4px rgba(123,196,127,.13), 0 0 20px rgba(123,196,127,.28);
    }

    .layout {
      position: relative;
      display: flex;
      min-height: 0;
      height: 100%;
      overflow-x: clip;
    }

    .rail {
      --rail-accent: var(--brand);
      --rail-accent-2: var(--brand-2);
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      width: 248px;
      min-height: 0;
      border-right: 1px solid var(--chrome-edge);
      background: var(--chrome-surface-2);
      transition: width .22s ease;
    }

    .rail.collapsed {
      width: 34px;
    }

    .rail-head {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 40px;
      padding: 0 12px;
      border-bottom: 1px solid var(--chrome-line);
    }

    .rail.collapsed .rail-head {
      padding: 0 6px;
      justify-content: center;
    }

    .rail-title {
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .rail.collapsed .rail-title {
      display: none;
    }

    .rail-toggle {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      border: 1px solid var(--chrome-line-2);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      padding: 0;
    }

    .rail-toggle:hover {
      color: var(--rail-accent-2);
      border-color: color-mix(in srgb, var(--rail-accent) 45%, var(--chrome-line-2));
    }

    .rail-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .rail.collapsed .rail-body {
      display: none;
    }

    .rail-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .rail-dot {
      flex: 0 0 auto;
      width: 9px;
      height: 9px;
      margin-top: 3px;
      border-radius: 50%;
      background: rgba(139,148,167,.4);
    }

    .rail-dot.active {
      background: var(--rail-accent-2);
      animation: railPulse 1.4s ease-in-out infinite;
    }

    .rail-dot.done {
      width: auto;
      height: auto;
      margin-top: -1px;
      border-radius: 0;
      background: none;
      color: var(--done);
      font-size: 11px;
      font-weight: 700;
    }

    .rail-subject {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 12px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .rail-index {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }

    .canvas {
      position: relative;
      flex: 1 1 auto;
      overflow: auto;
      min-height: 0;
    }

    .stage {
      position: relative;
      min-width: 820px;
      min-height: 100%;
      height: max(100%, var(--stage-h, 620px));
    }

    .links {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .link {
      fill: none;
      stroke-linecap: round;
      opacity: .96;
      transition: opacity .6s ease, stroke .25s ease, stroke-width .25s ease;
    }

    .link.running {
      stroke-dasharray: 9 10;
      animation: flow 950ms linear infinite;
      filter: drop-shadow(0 0 8px color-mix(in srgb, currentColor 42%, transparent));
    }

    .link.done {
      stroke: #3A4453;
    }

    .link.enter {
      animation: draw 350ms cubic-bezier(.2,.8,.2,1), flow 950ms linear infinite;
    }

    .link.dim {
      opacity: .55;
    }

    .link.fade {
      opacity: 0;
    }

    .hub {
      position: absolute;
      z-index: 3;
      left: 8%;
      top: 50%;
      width: 224px;
      height: 108px;
      transform: translateY(-50%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(21,26,35,.98), rgba(17,21,29,.98));
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: opacity .3s ease, filter .3s ease, border-color .2s ease, box-shadow .2s ease;
    }

    .hub:hover {
      border-color: rgba(25,194,157,.4);
      box-shadow: var(--shadow), 0 0 0 3px rgba(25,194,157,.12);
    }

    .hub::before {
      content: "";
      position: absolute;
      inset: -8px;
      border: 1px solid rgba(25,194,157,.18);
      border-radius: 22px;
      opacity: 0;
      transform: scale(.98);
      pointer-events: none;
    }

    .hub.active::before {
      animation: hubPulse 1.9s ease-in-out infinite;
    }

    .hub.ended {
      opacity: .56;
      filter: saturate(.45);
    }

    .hub-inner {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 12px;
      align-items: center;
      height: 100%;
      padding: 13px 16px;
    }

    .spark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: rgba(217,119,87,.14);
      color: var(--text);
    }

    .spark svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--text);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.6;
    }

    .brand-chip {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 14%, transparent);
    }

    .brand-chip img {
      width: 14px;
      height: 14px;
      object-fit: contain;
    }

    .hub-text {
      min-width: 0;
    }

    .hub-title {
      gap: 7px;
      min-width: 0;
      font-size: 14px;
      font-weight: 700;
    }

    .hub-subtitle {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-top: 5px;
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .hub-subtitle-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hub-tokens {
      flex: 0 0 auto;
      color: rgba(139,148,167,.7);
      font-family: var(--mono);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }

    .hub-activity {
      overflow: hidden;
      max-height: 14px;
      margin-top: 4px;
      color: rgba(139,148,167,.78);
      font-family: var(--mono);
      font-size: 10px;
      line-height: 1.3;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0;
      transition: opacity .2s ease;
    }

    .hub-activity.show {
      opacity: 1;
    }

    /* §31.4: capability-chips row under the activity line — always
       rendered at a fixed height (empty when no capabilities) so the hub
       card's geometry never shifts; unlike .files-row this is never
       toggled `hidden`, so the [hidden]-vs-flex precedence trap doesn't
       apply here. Chips are scoped narrower than the card's file-chip
       size since HUB_W (224px) is tighter than an agent card (280px). */
    .hub-caps {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 4px;
      height: 16px;
      margin-top: 4px;
      overflow: hidden;
    }

    .hub-caps .file-chip {
      max-width: 56px;
      padding: 1px 6px;
      font-size: 9px;
      line-height: 1.3;
    }

    .empty {
      position: absolute;
      z-index: 2;
      left: 50%;
      top: 50%;
      width: min(360px, 42vw);
      transform: translate(-4%, -50%);
      color: rgba(139,148,167,.88);
      font-size: 13px;
      text-align: center;
      white-space: pre-wrap;
      pointer-events: none;
    }

    .agents {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    /* §32.1: left/top are zeroed and both axes live in the transform, so the
       JS `layout` map is the single source of position for cards AND links.
       Do not reintroduce a `left` calc here — cardX() is the only definition
       of a card's X, breakpoint included. */
    .agent {
      position: absolute;
      left: 0;
      top: 0;
      width: 280px;
      min-height: 108px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(21,26,35,.98);
      box-shadow: var(--shadow);
      overflow: hidden;
      opacity: 1;
      transform: translate(var(--x, 0), var(--y, 0));
      transform-origin: left center;
      transition:
        transform 300ms cubic-bezier(.2,.8,.2,1),
        opacity 600ms ease,
        border-color 220ms ease,
        filter 600ms ease;
      pointer-events: auto;
      cursor: grab;
      touch-action: none;
    }

    /* §32.3: the transform transition has to be off mid-drag or the card
       trails the pointer by 300ms. */
    .agent.dragging {
      transition: opacity 600ms ease, border-color 220ms ease, filter 600ms ease;
      cursor: grabbing;
      z-index: 5;
      box-shadow: 0 18px 40px rgba(0,0,0,.5), var(--shadow);
    }

    .agent::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--accent);
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 45%, transparent);
    }

    .agent.enter {
      animation: nodeIn 250ms cubic-bezier(.2,.8,.2,1) both;
    }

    .agent.dim {
      opacity: .55;
      filter: saturate(.7);
    }

    .agent.fade {
      opacity: 0;
    }

    .agent.error-flick {
      animation: errorFlick 1.2s ease-out;
    }

    .agent-inner {
      display: grid;
      gap: 8px;
      padding: 12px 14px 12px 16px;
    }

    .agent-head {
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .agent-label {
      flex: 1 1 auto;
      overflow: hidden;
      font-size: 13px;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .step-tag {
      flex: 0 0 auto;
      padding: 3px 6px;
      border: 1px solid rgba(25,194,157,.32);
      border-radius: 999px;
      background: rgba(25,194,157,.12);
      color: var(--openai);
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
    }

    .model {
      flex: 0 0 auto;
      max-width: 126px;
      overflow: hidden;
      padding: 3px 7px;
      border: 1px solid rgba(230,234,242,.09);
      border-radius: 999px;
      background: rgba(255,255,255,.045);
      color: rgba(230,234,242,.76);
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .tokens-badge {
      flex: 0 0 auto;
      padding: 3px 7px;
      border: 1px solid rgba(230,234,242,.09);
      border-radius: 999px;
      background: rgba(255,255,255,.045);
      color: rgba(230,234,242,.6);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .description {
      overflow: hidden;
      color: rgba(230,234,242,.76);
      font-size: 11px;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-line {
      gap: 8px;
      min-width: 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.2;
    }

    .status-line.done {
      flex-direction: column;
      align-items: stretch;
      gap: 4px;
    }

    .status-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .final-message {
      overflow: hidden;
      color: rgba(230,234,242,.76);
      font-family: var(--font);
      font-size: 11px;
      font-style: italic;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .pulse-dot {
      flex: 0 0 auto;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: dotPulse 1.35s ease-in-out infinite;
    }

    .pulse-dot.stall {
      background: var(--amber);
      animation: stallPulse 1.35s ease-in-out infinite;
    }

    .activity {
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .activity.narrative {
      font-style: italic;
    }

    .timer {
      flex: 0 0 auto;
      color: rgba(230,234,242,.7);
      font-variant-numeric: tabular-nums;
    }

    .done-pill {
      flex: 0 0 auto;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(123,196,127,.14);
      color: var(--done);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 800;
    }

    .files-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      min-height: 20px;
    }

    .file-chip {
      max-width: 84px;
      overflow: hidden;
      padding: 2px 7px;
      border: 1px solid rgba(230,234,242,.1);
      border-radius: 999px;
      background: rgba(255,255,255,.035);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: border-color .2s ease, color .2s ease;
    }

    .file-chip.file-more {
      max-width: 36px;
      color: rgba(230,234,242,.55);
    }

    .file-chip.collision {
      border-color: rgba(232,162,61,.55);
      color: var(--amber);
      animation: chipPulse 1.4s ease-in-out infinite;
    }

    .file-chip.cap-chip {
      max-width: 108px;
      font-family: var(--font);
      font-weight: 650;
    }

    .file-chip.cap-skill {
      border-color: rgba(232,162,61,.4);
      background: rgba(232,162,61,.1);
      color: var(--amber);
    }

    .file-chip.cap-mcp {
      border-color: color-mix(in srgb, var(--accent, var(--openai)) 45%, transparent);
      background: color-mix(in srgb, var(--accent, var(--openai)) 14%, transparent);
      color: var(--accent, var(--openai));
    }

    /* Plug icon on MCP chips; em-sized so it scales with the chip's font
       (10px on cards, 9px in the hub row). stroke:currentColor tints it. */
    .file-chip.cap-chip .cap-icon {
      width: 1.1em;
      height: 1.1em;
      margin-right: 0.25em;
      vertical-align: -0.2em;
    }

    .file-empty {
      color: rgba(139,148,167,.5);
      font-size: 10px;
      font-style: italic;
    }

    /* Elements reusing .files-row (e.g. drawer capabilities) rely on the
       `hidden` attribute to fully collapse; without this, the class's own
       `display: flex` would out-rank the UA `[hidden]` rule. */
    .files-row[hidden] {
      display: none;
    }

    .drawer {
      position: absolute;
      z-index: 20;
      top: 0;
      right: 0;
      bottom: 0;
      width: 360px;
      max-width: 92vw;
      display: flex;
      flex-direction: column;
      background: var(--card);
      border-left: 1px solid var(--border);
      box-shadow: -12px 0 32px rgba(0,0,0,.4);
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.2,.8,.2,1);
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-head {
      flex: 0 0 auto;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .drawer-title {
      flex: 1 1 auto;
      min-width: 0;
    }

    .drawer-label {
      overflow: hidden;
      font-size: 14px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drawer-sub {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .drawer-status {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .drawer-status.done {
      color: var(--done);
    }

    .drawer-spawned {
      overflow: hidden;
      margin-top: 6px;
      color: var(--muted);
      font-size: 10.5px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drawer-close {
      flex: 0 0 auto;
      width: 26px;
      height: 26px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
    }

    .drawer-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .drawer-desc {
      color: rgba(230,234,242,.8);
      font-size: 12px;
      line-height: 1.4;
    }

    .drawer-final {
      padding: 10px 12px;
      border: 1px solid rgba(123,196,127,.22);
      border-radius: 10px;
      background: rgba(123,196,127,.08);
      color: rgba(230,234,242,.85);
      font-size: 12px;
      font-style: italic;
      line-height: 1.4;
    }

    .drawer-tokens {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,.02);
    }

    /* Same hidden-vs-display:flex precedence trap as .files-row above. */
    .drawer-tokens[hidden] {
      display: none;
    }

    .drawer-tokens-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
    }

    .drawer-tokens-value {
      color: rgba(230,234,242,.85);
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
    }

    .drawer-tokens-cost {
      margin-top: 3px;
      padding-top: 8px;
      border-top: 1px solid rgba(35,43,56,.6);
      color: rgba(230,234,242,.85);
      font-family: var(--mono);
      font-size: 11px;
      text-align: right;
    }

    .drawer-log-head {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .drawer-log {
      flex: 1 1 auto;
      min-height: 80px;
      overflow-y: auto;
    }

    .log-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(35,43,56,.55);
      color: rgba(230,234,242,.8);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.35;
    }

    .log-row.error {
      color: var(--error);
    }

    .log-text {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .log-ms {
      flex: 0 0 auto;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .log-empty {
      padding: 8px 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
    }

    @keyframes nodeIn {
      from {
        opacity: 0;
        transform: translate(var(--x, 0), var(--y, 0)) scale(.85);
      }
      to {
        opacity: 1;
        transform: translate(var(--x, 0), var(--y, 0)) scale(1);
      }
    }

    @keyframes draw {
      from { stroke-dashoffset: 420; }
      to { stroke-dashoffset: 0; }
    }

    @keyframes flow {
      to { stroke-dashoffset: -38; }
    }

    @keyframes dotPulse {
      0%, 100% {
        opacity: .56;
        transform: scale(.75);
        box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 28%, transparent);
      }
      50% {
        opacity: 1;
        transform: scale(1);
        box-shadow: 0 0 0 5px color-mix(in srgb, var(--accent) 12%, transparent);
      }
    }

    @keyframes stallPulse {
      0%, 100% {
        opacity: .6;
        transform: scale(.8);
        box-shadow: 0 0 0 0 rgba(232,162,61,.32);
      }
      50% {
        opacity: 1;
        transform: scale(1);
        box-shadow: 0 0 0 5px rgba(232,162,61,.16);
      }
    }

    @keyframes railPulse {
      0%, 100% {
        opacity: .55;
        transform: scale(.8);
      }
      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes chipPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232,162,61,.45); }
      50% { box-shadow: 0 0 0 4px rgba(232,162,61,.16); }
    }

    @keyframes errorFlick {
      0% {
        border-color: var(--border);
        box-shadow: var(--shadow);
      }
      28% {
        border-color: rgba(229,72,77,.9);
        box-shadow: 0 0 0 3px rgba(229,72,77,.32), var(--shadow);
      }
      100% {
        border-color: var(--border);
        box-shadow: var(--shadow);
      }
    }

    @keyframes hubPulse {
      0%, 100% {
        opacity: .2;
        transform: scale(.98);
        box-shadow: 0 0 0 rgba(25,194,157,0);
      }
      50% {
        opacity: 1;
        transform: scale(1);
        box-shadow: 0 0 34px rgba(25,194,157,.12);
      }
    }

    /* §28a: 248px rail + 820px stage min-width forces a horizontal
       scrollbar between 900-1068px. Auto-collapse the rail to the same
       34px width/visual the user's manual toggle produces (see
       `.rail.collapsed` above) so the canvas fits without scrolling. */
    @media (max-width: 1068px) {
      .rail {
        width: 34px;
      }

      .rail .rail-head {
        padding: 0 6px;
        justify-content: center;
      }

      .rail .rail-title {
        display: none;
      }

      .rail .rail-body {
        display: none;
      }
    }

    @media (max-width: 899px) {
      .rail {
        display: none !important;
      }
    }

    @media (max-width: 760px) {
      .topbar {
        padding: 0 12px;
        gap: 10px;
      }

      .brand span {
        max-width: 148px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chip {
        display: none;
      }

      select {
        width: 142px;
      }

      .stage {
        min-width: 720px;
      }

      .hub {
        left: 34px;
      }

      .empty {
        left: 398px;
        width: 250px;
        transform: translateY(-50%);
      }

      .drawer {
        width: 320px;
      }
    }

    /* --- plan rail affordances (§33) ------------------------------------ */
    .rail-head-actions {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rail-expand {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      border: 1px solid var(--chrome-line-2);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .rail-expand:hover {
      color: var(--rail-accent-2);
      border-color: color-mix(in srgb, var(--rail-accent) 45%, var(--chrome-line-2));
    }

    .rail.collapsed .rail-expand {
      display: none;
    }

    .rail-body.clickable {
      cursor: pointer;
    }

    /* rail header identity glyph */
    .rail-title-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      overflow: hidden;
    }

    .rail-glyph {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 6px;
      color: var(--rail-accent);
      background: color-mix(in srgb, var(--rail-accent) 16%, transparent);
    }

    .rail-glyph svg { width: 11px; height: 11px; }
    .rail.collapsed .rail-title-wrap { display: none; }

    /* rail plan outline (§33) */
    .rail-outline {
      display: flex;
      flex-direction: column;
    }

    .rail-sec {
      display: flex;
      align-items: flex-start;
      margin: 13px 0 5px;
      padding-left: 9px;
      border-left: 2px solid color-mix(in srgb, var(--rail-accent) 65%, transparent);
    }

    .rail-outline > .rail-sec:first-child { margin-top: 0; }

    .rail-sec-text {
      overflow: hidden;
      color: var(--text);
      font-size: 11.5px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: .01em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .rail-sec.title {
      margin: 0 0 9px;
      padding: 0 0 10px;
      border-left: 0;
      border-bottom: 1px solid var(--border);
    }

    .rail-sec.title .rail-sec-text {
      font-size: 13px;
      letter-spacing: 0;
      color: var(--text);
    }

    .rail-sec.sub {
      border-left-color: color-mix(in srgb, var(--rail-accent) 28%, var(--border));
      margin-top: 9px;
    }

    .rail-sec.sub .rail-sec-text {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .rail-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 4px 0;
      padding-left: 11px;
    }

    .rail-item.depth1 { padding-left: 24px; }
    .rail-item.depth2 { padding-left: 37px; }

    .rail-bullet {
      flex: 0 0 auto;
      margin-top: 6px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--rail-accent) 60%, var(--muted));
    }

    .rail-check {
      flex: 0 0 auto;
      margin-top: 1px;
      width: 13px;
      height: 13px;
      border-radius: 4px;
      border: 1.4px solid var(--border);
      display: grid;
      place-items: center;
      font-size: 8px;
      line-height: 1;
      color: transparent;
    }

    .rail-check.done {
      border-color: var(--done);
      color: var(--done);
      background: color-mix(in srgb, var(--done) 16%, transparent);
    }

    .rail-item-text {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      color: rgba(230,234,242,.78);
      font-size: 11.5px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .rail-item-text.done {
      color: var(--muted);
      text-decoration: line-through;
    }

    .rail-open {
      flex: 0 0 auto;
      margin-top: 14px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 32px;
      padding: 0 10px;
      border: 1px solid color-mix(in srgb, var(--rail-accent) 30%, var(--border));
      border-radius: 9px;
      background: color-mix(in srgb, var(--rail-accent) 9%, transparent);
      color: var(--rail-accent);
      font-family: var(--font);
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease;
    }

    .rail-open:hover {
      background: color-mix(in srgb, var(--rail-accent) 18%, transparent);
      border-color: color-mix(in srgb, var(--rail-accent) 55%, transparent);
    }

    .rail-open svg { width: 13px; height: 13px; }

    /* --- plan modal (§33) ----------------------------------------------- */
    .plan-modal {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(12px, 4vw, 40px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .plan-modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .plan-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(6,8,12,.62);
      backdrop-filter: blur(6px);
    }

    .plan-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      width: min(800px, 100%);
      max-height: min(86vh, 940px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 24px 64px rgba(0,0,0,.55), var(--shadow);
      transform: translateY(10px) scale(.99);
      transition: transform .22s cubic-bezier(.2,.8,.2,1);
      overflow: hidden;
    }

    .plan-modal.open .plan-panel {
      transform: none;
    }

    .plan-head {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, color-mix(in srgb, var(--anthropic) 9%, transparent), transparent);
    }

    .plan-glyph {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 9px;
      color: var(--anthropic);
      background: color-mix(in srgb, var(--anthropic) 16%, transparent);
    }

    .plan-glyph svg {
      width: 18px;
      height: 18px;
    }

    .plan-heading {
      flex: 1 1 auto;
      min-width: 0;
    }

    .plan-title {
      font-size: 15px;
      font-weight: 700;
    }

    .plan-sub {
      margin-top: 2px;
      overflow: hidden;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .plan-btn {
      flex: 0 0 auto;
      height: 28px;
      padding: 0 11px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 11.5px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color .15s ease, border-color .15s ease, background .15s ease;
    }

    .plan-btn:hover {
      color: var(--text);
      border-color: color-mix(in srgb, var(--anthropic) 45%, var(--border));
    }

    .plan-btn.on {
      color: var(--anthropic);
      border-color: color-mix(in srgb, var(--anthropic) 45%, transparent);
      background: color-mix(in srgb, var(--anthropic) 12%, transparent);
    }

    .plan-btn[hidden] {
      display: none;
    }

    .plan-close {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
    }

    .plan-close:hover {
      color: var(--text);
    }

    .plan-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 22px 28px 30px;
    }

    .plan-empty {
      color: var(--muted);
      font-style: italic;
    }

    /* --- rendered markdown (.md) ---------------------------------------- */
    .md {
      color: var(--text);
      font-size: 14px;
      line-height: 1.62;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .md > *:first-child { margin-top: 0; }
    .md > *:last-child { margin-bottom: 0; }

    .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
      margin: 1.5em 0 .6em;
      line-height: 1.25;
      font-weight: 700;
    }

    .md h1 {
      font-size: 1.5em;
      padding-bottom: .3em;
      border-bottom: 1px solid var(--border);
    }

    .md h2 {
      font-size: 1.28em;
      padding-bottom: .24em;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 65%, transparent);
    }

    .md h3 { font-size: 1.12em; }
    .md h4 { font-size: 1em; }

    .md h5, .md h6 {
      font-size: .86em;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .md p { margin: .7em 0; }

    .md a {
      color: var(--anthropic);
      text-decoration: none;
      border-bottom: 1px solid color-mix(in srgb, var(--anthropic) 40%, transparent);
    }

    .md a:hover { border-bottom-color: var(--anthropic); }

    .md strong { font-weight: 700; color: #f2f5fb; }
    .md em { font-style: italic; }
    .md del { opacity: .55; }

    .md ul, .md ol {
      margin: .6em 0;
      padding-left: 1.5em;
    }

    .md li { margin: .3em 0; }
    .md li::marker { color: var(--muted); }
    .md ul { list-style: disc; }
    .md ol { list-style: decimal; }
    .md li > ul, .md li > ol { margin: .3em 0; }
    .md .md-li-body ul, .md .md-li-body ol { margin: .3em 0; }

    /* task-list items */
    .md li.md-task {
      list-style: none;
      margin-left: -1.5em;
      padding-left: 0;
      display: flex;
      gap: .55em;
      align-items: flex-start;
    }

    .md .md-li-body {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .md .md-check {
      flex: 0 0 auto;
      margin-top: .18em;
      width: 15px;
      height: 15px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      display: grid;
      place-items: center;
      font-size: 10px;
      line-height: 1;
      color: transparent;
    }

    .md .md-check.done {
      border-color: var(--done);
      color: var(--done);
      background: color-mix(in srgb, var(--done) 16%, transparent);
    }

    .md .md-check.active {
      border-color: var(--openai);
      color: var(--openai);
      background: color-mix(in srgb, var(--openai) 14%, transparent);
    }

    .md .md-li-text { flex: 1 1 auto; min-width: 0; }

    .md code {
      font-family: var(--mono);
      font-size: .88em;
      background: rgba(255,255,255,.07);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: .08em .38em;
    }

    .md pre.md-pre {
      position: relative;
      margin: .95em 0;
      padding: 13px 15px;
      background: #0c0f15;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow-x: auto;
    }

    .md pre.md-pre code {
      background: none;
      border: 0;
      border-radius: 0;
      padding: 0;
      font-size: 12.5px;
      line-height: 1.55;
      color: #d7dce6;
      white-space: pre;
    }

    .md pre.md-pre[data-lang]::before {
      content: attr(data-lang);
      position: absolute;
      top: 8px;
      right: 12px;
      font-family: var(--mono);
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      pointer-events: none;
    }

    .md blockquote {
      margin: .95em 0;
      padding: .1em 0 .1em 14px;
      border-left: 3px solid color-mix(in srgb, var(--anthropic) 55%, var(--border));
      color: rgba(230,234,242,.82);
    }

    .md blockquote p { margin: .35em 0; }

    .md hr {
      margin: 1.4em 0;
      border: 0;
      height: 1px;
      background: var(--border);
    }

    .md .md-table-wrap {
      overflow-x: auto;
      margin: 1em 0;
    }

    .md table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }

    .md th, .md td {
      padding: 7px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }

    .md th {
      background: rgba(255,255,255,.04);
      font-weight: 700;
    }

    .md tbody tr:nth-child(even) td {
      background: rgba(255,255,255,.015);
    }

    .md img {
      max-width: 100%;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="app">

          delete all[sessionId];

      function fmtTokens(n) {
        if (n == null) return "";
        const value = Number(n) || 0;
        if (value < 1000) return String(Math.round(value));
        const useM = value >= 1e6;
        const scaled = value / (useM ? 1e6 : 1000);
        const rounded = Math.round(scaled * 10) / 10;
        const text = Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
        return `${text}${useM ? "M" : "k"}`;
      }

      function fmtInt(n) {
        return (Number(n) || 0).toLocaleString("en-US");

        if (v == null) return "";

        return `$${n.toFixed(dp)}`;

      // --- lineage (§24) -----------------------------------------------------
      // Reorders a startedAt-sorted list depth-first: each agent's children
      // (in startedAt order) render immediately after it. An agent whose
      // parentId doesn't resolve to another agent in the same list renders as
      // a root — this is exactly v3 flat behavior when parentId is absent.

      function resolveParentAgent(agent, byId) {
        const parentId = agent.parentId;
        if (!parentId || parentId === agent.id) return null;
        return byId.get(parentId) || null;
      }

      function lineageOrder(list) {
        const byId = new Map(list.map(agent => [agent.id, agent]));
        const childrenOf = new Map();
        const roots = [];
        for (const agent of list) {
          const parent = resolveParentAgent(agent, byId);
          if (parent) {
            if (!childrenOf.has(parent.id)) childrenOf.set(parent.id, []);
            childrenOf.get(parent.id).push(agent);
          } else {
            roots.push(agent);
          }
        }
        const agents = [];
        const depthOf = new Map();
        const parentOf = new Map();
        const visit = (agent, depth, parent) => {
          if (depthOf.has(agent.id)) return;
          agents.push(agent);
          depthOf.set(agent.id, depth);
          parentOf.set(agent.id, parent);
          for (const child of childrenOf.get(agent.id) || []) visit(child, depth + 1, agent);
        };
        roots.forEach(root => visit(root, 0, null));
        // Defensive: a parent cycle (shouldn't happen — reducer guards
        // self-reference) must never drop an agent from render.
        for (const agent of list) {
          if (!depthOf.has(agent.id)) visit(agent, 0, null);
        }
        return { agents, depthOf, parentOf };
      }

      // Flatten inline markdown to plain text for the compact rail peek
      // (the full-fidelity render lives in the plan modal, §33).
      function stripInlineMd(text) {
        return String(text)
          .replace(/`([^`]+)`/g, "$1")
          .replace(/\*\*([^*]+)\*\*/g, "$1")
          .replace(/__([^_]+)__/g, "$1")
          .replace(/\*([^*]+)\*/g, "$1")
          .replace(/~~([^~]+)~~/g, "$1")
          .replace(/\[([^\]]+)\]\([^)]*\)/g, "$1");
      }

      // Rail peek: headings + list items, markers/checkboxes/inline markup
      // stripped. Broader than the old list-only filter so a plan that leads
      // with prose headings still shows something in the rail.
      function extractDocLines(markdown) {
        return String(markdown || "")
          .split("\n")
          .map(line => line.trim())
          .filter(line => /^(#{1,6}\s+|(-|\*|\+|\d+\.)\s+)/.test(line))
          .map(line => line
            .replace(/^#{1,6}\s+/, "")
            .replace(/^(-|\*|\+|\d+\.)\s+/, "")
            .replace(/^\[[ xX]\]\s+/, ""))
          .map(stripInlineMd)
          .filter(Boolean);
      }

      function stepIndex(plan, stepId) {

        return (plan.steps || []).findIndex(step => step.id === stepId);

      // --- markdown rendering (§33) -----------------------------------------
